<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabian Nights Helper</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a0633; color: white; padding: 20px; max-width: 600px; margin: auto; }
        h1 { text-align: center; color: #ffd700; text-shadow: 2px 2px #8b4513; }
        .card { background: #2d0a31; border: 2px solid #ffd700; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        label { display: block; margin-top: 15px; font-weight: bold; color: #ffcc33; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 25px; background: #ffd700; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; color: #1a0633; transition: 0.3s; }
        button:hover { background: #fff; }
        #results-area { margin-top: 30px; display: none; padding: 20px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; border-left: 5px solid #ffd700; }
        .para-num { font-size: 48px; color: #ffd700; display: block; text-align: center; }
        .text-detail { font-style: italic; color: #ddd; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

    <h1>Book of Tales Helper</h1>

    <div class="card">
        <label>1. Search Encounter Card</label>
        <input type="text" id="cardInput" placeholder="e.g. Wizard, Elephant, Zaila..." list="cardList">
        <datalist id="cardList"></datalist>

        <label>2. Your Roll (1-12)</label>
        <input type="number" id="rollInput" min="1" max="12" value="1">

        <button onclick="lookupEncounter()">Find Reactions</button>
    </div>

    <div id="results-area">
        <div id="encounterDesc" class="text-detail"></div>
        <label>3. Choose your Reaction:</label>
        <div id="reactionButtons"></div>
        <hr>
        <div id="finalParagraph" style="display:none; text-align:center;">
            <p>Go to Paragraph:</p>
            <span class="para-num" id="paraValue"></span>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
