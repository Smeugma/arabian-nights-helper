<!DOCTYPE html>
<html>
<head>
    <title>Arabian Nights Helper</title>
    <style>
        body { font-family: sans-serif; background: #1a0633; color: white; padding: 20px; max-width: 500px; margin: auto; }
        .card { background: #2d0a31; border: 2px solid gold; padding: 20px; border-radius: 15px; }
        select, input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: none; font-size: 16px; }
        button { background: gold; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        #result { margin-top: 20px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; border-left: 5px solid gold; }
    </style>
</head>
<body>

    <h1>Tales Helper</h1>

    <div class="card">
        <label>1. Select Type</label>
        <select id="typeSelect" onchange="runUpdate()">
            <option value="">-- Choose --</option>
            <option value="City">City</option>
            <option value="Character">Character</option>
            <option value="Terrain">Terrain</option>
        </select>

        <div id="cardSection" class="hidden">
            <label>2. Select Card</label>
            <select id="cardSelect"></select>
            
            <label>3. Roll (1-12)</label>
            <input type="number" id="rollInput" value="1" min="1" max="12">
            
            <button onclick="showParagraph()">Show Paragraph</button>
        </div>
    </div>

    <div id="result" class="hidden">
        <div id="encName" style="font-size: 20px; color: gold; font-weight: bold;"></div>
        <div id="paraValue" style="font-size: 40px; text-align: center;"></div>
    </div>

    <script>
        // DATA IS NOW INSIDE THE FILE TO PREVENT ERRORS
        const encounterData = [
            {"Encounter Type": "City", "Encounter Card": "Zaila", "Modified Roll": 1, "Text": "Rock Slide", "Paragraph": 629},
            {"Encounter Type": "Character", "Encounter Card": "Wizard", "Modified Roll": 1, "Text": "Kindly Wizard", "Paragraph": 334},
            {"Encounter Type": "Terrain", "Encounter Card": "Elephant", "Modified Roll": 1, "Text": "Disguised Beggar", "Paragraph": 1915}
        ];

        function runUpdate() {
            const type = document.getElementById('typeSelect').value;
            const cardSection = document.getElementById('cardSection');
            const cardSelect = document.getElementById('cardSelect');

            if (!type) return;

            // Filter cards for dropdown
            const cards = [...new Set(encounterData
                .filter(row => row["Encounter Type"] === type)
                .map(row => row["Encounter Card"])
            )];

            cardSelect.innerHTML = '<option value="">-- Select --</option>';
            cards.forEach(c => {
                let opt = document.createElement('option');
                opt.value = c; opt.innerText = c;
                cardSelect.appendChild(opt);
            });

            cardSection.classList.remove('hidden');
        }

        function showParagraph() {
            const type = document.getElementById('typeSelect').value;
            const card = document.getElementById('cardSelect').value;
            const roll = parseInt(document.getElementById('rollInput').value);

            const match = encounterData.find(row => 
                row["Encounter Type"] === type && 
                row["Encounter Card"] === card && 
                parseInt(row["Modified Roll"]) === roll
            );

            if (match) {
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('encName').innerText = match["Text"];
                document.getElementById('paraValue').innerText = "Para: " + match["Paragraph"];
            } else {
                alert("No match found in test data!");
            }
        }
    </script>
</body>
</html>
